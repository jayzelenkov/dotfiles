# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# Config version for compatibility and deprecations
# Fallback value (if you omit the key): config-version = 1
config-version = 2

# You can use it to add commands that run after AeroSpace startup.
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = [
    'exec-and-forget sketchybar',
    'exec-and-forget borders',
]

# Notify Sketchybar about workspace change
exec-on-workspace-change = [
    '/bin/bash',
    '-c',
    '$HOME/.config/aerospace/on-workspace-change.sh',
]

# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 48

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# List of workspaces that should stay alive even when they contain no windows,
# even when they are invisible.
# This config version is only available since 'config-version = 2'
# Fallback value (if you omit the key): persistent-workspaces = []
persistent-workspaces = ["1", "2", "3", "4", "5", "6"]

# Float Wispr Flow by default
# See: https://nikitabobko.github.io/AeroSpace/guide#on-window-detected-callback
[[on-window-detected]]
if.app-id = 'com.electron.wispr-flow.accessibility-mac-app'
run = 'layout floating'

# Float CleanShot X windows by default
# See: https://nikitabobko.github.io/AeroSpace/guide#on-window-detected-callback
[[on-window-detected]]
if.app-id = 'pl.maketheweb.cleanshotx'
check-further-callbacks = true
run = 'layout floating'

# Float Raycast AI Chat by default
# See: https://nikitabobko.github.io/AeroSpace/guide#on-window-detected-callback
[[on-window-detected]]
if.app-id = 'com.raycast.macos'
run = 'layout floating'

# Float 1Password — Quick Access palette needs an explicit title rule because its
# title initializes asynchronously, causing on-window-detected to race with
# AeroSpace's own dialog heuristic and produce inconsistent float/tile behavior.
[[on-window-detected]]
if.app-id = 'com.1password.1password'
if.window-title-regex-substring = 'Quick Access'
run = 'layout floating'

# Catch-all: float main window, Settings, and any other 1Password windows
[[on-window-detected]]
if.app-id = 'com.1password.1password'
run = 'layout floating'


# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# See: https://nikitabobko.github.io/AeroSpace/commands#mode
# A callback that runs every time binding mode changes
# on-mode-changed = []
# Possible values: (qwerty|dvorak|colemak)

# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
preset = 'qwerty'

# F-key aliases to work around Carbon RegisterEventHotKey bug:
# shift+symbol keys (shift+/ = ?, shift+, = <) fail silently with Carbon.
# We route hyper+shift+/ → cmd+ctrl+opt+F13 in Karabiner, then alias here.
[key-mapping.key-notation-to-key-code]
comma2 = 'f13'
dot2 = 'f14'
slash2 = 'f15'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See:
#                 https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
outer.top = [
    # offset of 32 on internal display, because of notch (16" MPB)
    { monitor.'built-in.*' = 16 },
    48,
]
outer.right = 16
outer.bottom = 16
outer.left = 16
inner.horizontal = 16
inner.vertical = 16

[workspace-to-monitor-force-assignment]
5 = 'secondary'
6 = 'secondary'

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]
# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

# Switch between layouts
# See: https://nikitabobko.github.io/AeroSpace/commands#layout
# hyper+, → accordion  (comma2=f13)
cmd-alt-ctrl-comma2 = 'layout accordion horizontal vertical'

# hyper+/ → tiles  (slash2=f15)
cmd-alt-ctrl-slash2 = 'layout tiles horizontal vertical'

# Toggle windows in and out of the tiling layout/floating
# See: https://nikitabobko.github.io/AeroSpace/commands#layout
cmd-alt-ctrl-shift-f = 'layout floating tiling'

# Make windows fullscreen
# See: https://nikitabobko.github.io/AeroSpace/commands#fullscreen
cmd-alt-ctrl-shift-k = 'fullscreen'

# Switch window focus
# See: https://nikitabobko.github.io/AeroSpace/commands#focus
cmd-alt-ctrl-shift-left = 'focus left --ignore-floating'
cmd-alt-ctrl-shift-down = 'focus down --ignore-floating'
cmd-alt-ctrl-shift-up = 'focus up --ignore-floating'
cmd-alt-ctrl-shift-right = 'focus right --ignore-floating'

# Move windows in the given direction
# See: https://nikitabobko.github.io/AeroSpace/commands#move
cmd-alt-ctrl-left = 'move left'
cmd-alt-ctrl-down = 'move down'
cmd-alt-ctrl-up = 'move up'
cmd-alt-ctrl-right = 'move right'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace
cmd-alt-ctrl-shift-1 = 'workspace 1'
cmd-alt-ctrl-shift-2 = 'workspace 2'
cmd-alt-ctrl-shift-3 = 'workspace 3'
cmd-alt-ctrl-shift-4 = 'workspace 4'
cmd-alt-ctrl-shift-5 = 'workspace 5'
cmd-alt-ctrl-shift-6 = 'workspace 6'

# See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
cmd-alt-ctrl-1 = 'move-node-to-workspace 1'
cmd-alt-ctrl-2 = 'move-node-to-workspace 2'
cmd-alt-ctrl-3 = 'move-node-to-workspace 3'
cmd-alt-ctrl-4 = 'move-node-to-workspace 4'
cmd-alt-ctrl-5 = 'move-node-to-workspace 5'
cmd-alt-ctrl-6 = 'move-node-to-workspace 6'

# Cycle through workspaces
cmd-alt-ctrl-shift-leftSquareBracket = 'workspace --wrap-around prev'
cmd-alt-ctrl-shift-rightSquareBracket = 'workspace --wrap-around next'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
alt-tab = 'workspace-back-and-forth'
# See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'


# Enter service mode
# See: https://nikitabobko.github.io/AeroSpace/commands#mode
cmd-alt-ctrl-shift-q = [
    'mode service',
    'exec-and-forget sketchybar --trigger aerospace_service_mode_enabled_changed AEROSPACE_SERVICE_MODE_ENABLED=true',
]

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]

# Move windows to other nodes
# See: https://nikitabobko.github.io/AeroSpace/commands#join-with
h = 'join-with left'
j = 'join-with down'
k = 'join-with up'
l = 'join-with right'

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
# Resize windows
left = 'resize width -50'
down = 'resize height -50'
up = 'resize height +50'
right = 'resize width +50'
shift-down = 'resize smart -50'
shift-up = 'resize smart +50'

# Reset layout
# See: https://nikitabobko.github.io/AeroSpace/commands#flatten-workspace-tree
r = [
    'flatten-workspace-tree',
    'mode main',
    'exec-and-forget sketchybar --trigger aerospace_service_mode_enabled_changed AEROSPACE_SERVICE_MODE_ENABLED=false',
]

# Reload config
# See: https://nikitabobko.github.io/AeroSpace/commands#reload-config
c = [
    'reload-config',
    'mode main',
    'exec-and-forget sketchybar --trigger aerospace_service_mode_enabled_changed AEROSPACE_SERVICE_MODE_ENABLED=false',
]

# Close all windows on focused workspace
# See: https://nikitabobko.github.io/AeroSpace/commands#close-all-windows-but-current
backspace = [
    'close-all-windows-but-current',
    'mode main',
    'exec-and-forget sketchybar --trigger aerospace_service_mode_enabled_changed AEROSPACE_SERVICE_MODE_ENABLED=false',
]
# Back to 'main' mode
# See: https://nikitabobko.github.io/AeroSpace/commands#mode
esc = [
    'mode main',
    'exec-and-forget sketchybar --trigger aerospace_service_mode_enabled_changed AEROSPACE_SERVICE_MODE_ENABLED=false',
]
